kind = "web"
previewPath = "/"
title = "ClashLayoutsHub"
version = "1.0.0"
id = "artifacts/clash-layouts-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23236

[services.development]
run = "pnpm --filter @workspace/clash-layouts-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clash-layouts-hub", "run", "build" ]
publicDir = "artifacts/clash-layouts-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23236"
BASE_PATH = "/"
